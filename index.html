  <!-- Inlined Critical CSS for LCP & Performance -->
  <style>
    /* CSS Variables */
    :root,
    [data-theme='dark'] {
      --color-bg-primary: #0a0a0f;
      --color-bg-secondary: #13131a;
      --color-text-primary: #ffffff;
      --color-text-secondary: #cbd5e1;
      --color-primary: #667eea;
      --color-accent: #00f2fe;
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: 10px;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Outfit', sans-serif;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --radius-full: 9999px;
      --transition-base: 0.3s ease;
    }

    [data-theme='light'] {
      --color-bg-primary: #f4f5fb;
      --color-bg-secondary: #eaedf8;
      --color-text-primary: #0f172a;
      --color-text-secondary: #334155;
      --color-primary: #4f46e5;
      --color-accent: #0891b2;
      --glass-bg: rgba(255, 255, 255, 0.65);
    }

    /* Base Styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .gradient-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Navigation */
    .navigation {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: var(--spacing-md) 0;
      transition: all var(--transition-base);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 800;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
      will-change: color;
    }

    @media (max-width: 768px) {
      .nav-menu {
        display: none;
      }
    }

    /* Theme Toggle */
    .theme-toggle {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      width: 52px;
      height: 28px;
      cursor: pointer;
    }

    .theme-toggle-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gradient-primary);
      margin-left: auto;
      margin-right: 4px;
    }

    [data-theme='light'] .theme-toggle-thumb {
      margin-left: 4px;
      margin-right: auto;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding-top: 80px;
    }

    .hero-name {
      font-family: var(--font-heading);
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .hero-title {
      font-size: 2rem;
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
      min-height: 60px;
    }

    .typing-text {
      color: var(--color-accent);
      display: inline-block;
      min-width: 280px;
      text-align: left;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-outline {
      border: 2px solid var(--color-primary);
      color: var(--color-primary);
    }

    @media (max-width: 768px) {
      .hero-name {
        font-size: 2.5rem;
      }

      .hero-title {
        font-size: 1.5rem;
      }

      .hero-buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }
    }

    /* Keyframes */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    /* Skeleton Hidden once React Hydrates */
    #root:not(:empty) .hero-skeleton {
      display: none;
    }
  </style>
</head>
