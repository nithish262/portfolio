  <!-- Inlined Critical CSS for LCP -->
  <style>
    :root {
      --color-bg-primary: #0a0a0f;
      --color-text-primary: #ffffff;
      --color-text-secondary: #cbd5e1;
      --color-primary: #667eea;
      --color-accent: #00f2fe;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Outfit', sans-serif;
    }

    [data-theme='light'] {
      --color-bg-primary: #f4f5fb;
      --color-text-primary: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-name {
      font-family: var(--font-heading);
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 1rem;
    }

    .hero-title {
      font-size: 2rem;
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
    }

    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .skip-link {
      position: absolute;
      top: -100px;
    }

    @media (max-width: 768px) {
      .hero-name {
        font-size: 2.5rem;
      }

      .hero-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <!-- Skip to main content for keyboard / screen reader users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="root">
    <!-- Critical LCP Skeleton (Hydrated by React) -->
    <section class="hero">
      <div class="hero-content container">
        <h1 class="hero-name"><span class="gradient-text">Nithish Kumar P</span></h1>
        <h2 class="hero-title">Full Stack Developer</h2>
      </div>
    </section>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
