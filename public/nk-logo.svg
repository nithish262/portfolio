<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="NK Logo">
  <defs>
    <linearGradient id="nk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="nk-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#nk-grad)"/>
  <!-- Subtle shine overlay -->
  <rect width="100" height="50" rx="22" fill="url(#nk-shine)"/>
  <!-- NK initials -->
  <text
    x="50"
    y="63"
    font-family="Arial, Helvetica, sans-serif"
    font-size="42"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >NK</text>
</svg>
